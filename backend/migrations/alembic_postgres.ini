# Alembic configuration for PostgreSQL (chat_sessions, chat_messages, cities)

[alembic]
script_location = migrations
version_locations = migrations/versions/postgres
prepend_sys_path = .
version_path_separator = os

# URL is injected at runtime via %(DATABASE_URL)s environment interpolation
sqlalchemy.url = %(DATABASE_URL)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
